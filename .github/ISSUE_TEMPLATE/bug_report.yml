name: Bug report
description: Something is broken in the module, the compose stack or the docs
labels: [bug]
body:
  - type: dropdown
    id: path
    attributes:
      label: Deployment path
      options:
        - Terraform (AWS)
        - Compose-only
        - Both / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Module or repo version
      placeholder: v0.1.0, commit SHA or branch
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect and what happened instead
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. terraform apply with ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: For Terraform deployments include /var/log/cloud-init-output.log from the instance (via SSM session) and docker compose logs. Redact secrets and account IDs.
      render: shell
