name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - run: terraform fmt -check -recursive

  validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - terraform
          - terraform/examples/complete
          - terraform/examples/existing-vpc
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - run: terraform -chdir=${{ matrix.dir }} init -backend=false
      - run: terraform -chdir=${{ matrix.dir }} validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: terraform-linters/setup-tflint@v6
      - run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: tflint --chdir=terraform --config "$GITHUB_WORKSPACE/.tflint.hcl"

  security:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: |
          cat > docker/.env <<'EOF'
          SONAR_DB_USER=sonar
          SONAR_DB_NAME=sonar
          SONAR_DB_PASSWORD=ci-only
          SONAR_DOMAIN=sonar.example.com
          ACME_EMAIL=ci@example.com
          EOF
          docker compose -f docker/docker-compose.yml --env-file docker/.env config -q

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: shellcheck scripts/*.sh

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: "**/*.md"
