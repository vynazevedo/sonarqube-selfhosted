name: sonarqube

services:
  db:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d ${SONAR_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sonarqube:
    image: ${SONAR_IMAGE:-sonarqube:2026-lta-community}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/${SONAR_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_CORE_SERVERBASEURL: https://${SONAR_DOMAIN}
      SONAR_WEB_JAVAOPTS: ${SONAR_WEB_JAVAOPTS:-}
      SONAR_CE_JAVAOPTS: ${SONAR_CE_JAVAOPTS:-}
      SONAR_SEARCH_JAVAADDITIONALOPTS: ${SONAR_SEARCH_JAVAADDITIONALOPTS:-}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192
    networks:
      - backend
      - frontend
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - sonarqube
    environment:
      SONAR_DOMAIN: ${SONAR_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  caddy_data:
  caddy_config:

networks:
  backend:
  frontend:
